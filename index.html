<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketchy Calc Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            background: #fdf6e3; display: flex; justify-content: center; 
            align-items: center; height: 100vh; width: 100vw; margin: 0;
            overflow: hidden; font-family: 'Gochi Hand', cursive;
        }
        .calculator {
            width: 90%; max-width: 340px; background: #fff; padding: 20px;
            border: 3px solid #333; border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 8px 8px 0px #333;
        }
        #display {
            width: 100%; height: 70px; background: #fff; border: 2px solid #333;
            border-radius: 10px 80px 10px 80px/80px 10px 80px 10px;
            color: #333; font-size: 22px; text-align: right; padding: 15px;
            margin-bottom: 20px; font-family: 'Gochi Hand', cursive; outline: none;
        }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button {
            height: 60px; background: white; border: 2px solid #333;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            font-family: 'Gochi Hand', cursive; font-size: 22px; cursor: pointer;
        }
        button:active { transform: scale(0.95); background: #eee; }
        .operator { background: #fff9c4; }
        .clear { background: #ffcdd2; }
        .equal { background: #c8e6c9; grid-column: span 2; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(-1deg); }
            100% { transform: translate(0,0); }
        }
        .shake { animation: shake 0.3s; }
        .prank-text { font-size: 16px !important; color: #d32f2f !important; font-weight: bold; text-align: center !important; }
    </style>
</head>
<body>

<audio id="bgMusic" src="music.mp3" loop></audio>
<audio id="tapSound" src="https://www.myinstants.com/media/sounds/pop_h9o9D7t.mp3"></audio>
<audio id="prankSound" src="https://www.myinstants.com/media/sounds/discord-notification.mp3"></audio>

<div class="calculator" id="calcFrame">
    <input type="text" id="display" placeholder="0" readonly>
    <div class="buttons">
        <button class="clear" onclick="action('clear')">AC</button>
        <button class="operator" onclick="action('/')">÷</button>
        <button class="operator" onclick="action('*')">×</button>
        <button onclick="action('7')">7</button>
        <button onclick="action('8')">8</button>
        <button onclick="action('9')">9</button>
        <button class="operator" onclick="action('-')">-</button>
        <button onclick="action('4')">4</button>
        <button onclick="action('5')">5</button>
        <button onclick="action('6')">6</button>
        <button class="operator" onclick="action('+')">+</button>
        <button onclick="action('1')">1</button>
        <button onclick="action('2')">2</button>
        <button onclick="action('3')">3</button>
        <button class="equal" onclick="showPrank()">=</button>
        <button onclick="action('0')" style="grid-column: span 2;">0</button>
        <button onclick="action('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const calcFrame = document.getElementById('calcFrame');
    const bgMusic = document.getElementById('bgMusic');
    const tapSound = document.getElementById('tapSound');
    const prankSound = document.getElementById('prankSound');
    
    let isPranked = false;
    let musicPlaying = false;

    // Aapke naye funny messages
    const prankMessages = [
        "Kaha se ate hai ye log?",
        "Kyu nahi ho rahi padhai?",
        "Why are you Gay?"
    ];

    function action(val) {
        if (!musicPlaying) {
            bgMusic.play().catch(e => console.log("Music wait"));
            bgMusic.volume = 0.4;
            musicPlaying = true;
        }

        if (navigator.vibrate) navigator.vibrate(15);
        tapSound.currentTime = 0;
        tapSound.play();

        if (isPranked || val === 'clear') {
            display.value = "";
            display.classList.remove('prank-text');
            isPranked = false;
            if (val === 'clear') return;
        }
        display.value += val;
    }

    function showPrank() {
        if (display.value === "") return;
        
        bgMusic.pause();
        prankSound.play();
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

        // Random message select karna
        const randomMsg = prankMessages[Math.floor(Math.random() * prankMessages.length)];
        display.value = randomMsg;
        
        display.classList.add('prank-text');
        calcFrame.classList.add('shake');
        setTimeout(() => calcFrame.classList.remove('shake'), 300);
        isPranked = true;
    }
</script>
</body>
</html>
